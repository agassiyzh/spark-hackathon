services:
  llm-brain-gemma4:
    image: vllm/vllm-openai:gemma4-cu130
    container_name: llm-brain-gemma4
    # restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      HF_ENDPOINT:
        ${HF_ENDPOINT}
        #HTTP_PROXY: ${PROXY_URL}
        #HTTPS_PROXY: ${PROXY_URL}
      # ALL_PROXY: ${PROXY_URL}
      # NO_PROXY: ${NO_PROXY}
    volumes:
      - ${HF_HOME}:/root/.cache/huggingface
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s
    command:
      - google/gemma-4-26B-A4B-it
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - ${MAX_MODEL_LEN}
      - --max-num-seqs
      - ${MAX_NUM_SEQS}
      - --tensor-parallel-size
      - ${TENSOR_PARALLEL_SIZE}
      - --gpu-memory-utilization
      - ${GPU_MEMORY_UTILIZATION}
      - --enable-chunked-prefill
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --served-model-name
      - gemma4-26b
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
